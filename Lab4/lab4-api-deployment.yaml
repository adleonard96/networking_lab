apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab4-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab4-api
  template:
    metadata:
      labels:
        app: lab4-api
    spec:
      containers:
      - name: lab4-api
        image: lab4-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000